name: Docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build and push image (${{ matrix.variant }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Portable image: baseline x86-64, runs anywhere. Default tags
          # (latest, semver, sha-...).
          - variant: portable
            profile: release
            rustflags: ""
            suffix: ""
          # Optimized image for workflow deployment on modern x86-64 nodes:
          # x86-64-v3 (AVX2/BMI2) + thin-LTO release-native profile. Same tags
          # with an "-opt" suffix, e.g. :latest-opt, :0.1.1-opt.
          - variant: opt
            profile: release-native
            rustflags: "-C target-cpu=x86-64-v3"
            suffix: "-opt"

    steps:
      - uses: actions/checkout@v5

      - name: Compute version string
        id: version
        run: |
          set -euo pipefail
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            SHORT_SHA="${GITHUB_SHA:0:8}"
            VERSION="${CARGO_VERSION}-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Computed DADA2_RS_VERSION_FULL=${VERSION}"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DADA2_RS_VERSION_FULL=${{ steps.version.outputs.version }}
            CARGO_PROFILE=${{ matrix.profile }}
            RUSTFLAGS=${{ matrix.rustflags }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
